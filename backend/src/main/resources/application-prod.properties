# ===== Pickit - Configurazione Produzione (PostgreSQL) =====
# Attiva con: java -jar pickit.jar --spring.profiles.active=prod

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/pickitdb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:pickit}
spring.datasource.password=${DB_PASSWORD:changeme}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.h2.console.enabled=false
