# ===== Pickit - Configurazione Sviluppo =====

# Server
server.port=8080

# Database H2 (in-memory per sviluppo)
spring.datasource.url=jdbc:h2:mem:pickitdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 Console (accessibile su http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Jackson - serializzazione JSON
spring.jackson.serialization.write-dates-as-timestamps=false
